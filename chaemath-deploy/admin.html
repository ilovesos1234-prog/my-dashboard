<style>
  :root{
    --green:#2fa463; --green-d:#1f8049; --green-l:#4cc183;
    --yellow:#ffd33f; --yellow-d:#f5b91c; --yellow-soft:#fff3bf;
    --pink:#d6237f; --pink-d:#b81668; --pink-soft:#ffe3f1; --plum:#5e1a46;
    --cream:#fef9e6; --cream-d:#f8efcd;
    --card:#ffffff; --ink:#2b3a30; --muted:#9aa69a;
    --line:#f1ead3; --accent:#d6237f; --danger:#ef7a6a; --ok:#2fae6a;
    --shadow:0 8px 22px rgba(47,164,99,.13);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:"Apple SD Gothic Neo","Malgun Gothic","Segoe UI",sans-serif;
    background:linear-gradient(160deg,#d9f0c6,#ffe1ef); color:var(--ink);
    display:flex; justify-content:center; min-height:100%;
  }
  /* phone frame */
  #phone{
    width:100%; max-width:430px; background:var(--cream);
    min-height:100vh; position:relative; overflow:hidden;
    box-shadow:0 0 40px rgba(0,0,0,.18);
    display:flex; flex-direction:column;
  }
  .topbar{
    background:var(--green); color:#fff; padding:14px 18px;
    display:flex; align-items:center; gap:10px;
    border-bottom-left-radius:22px; border-bottom-right-radius:22px;
    position:sticky; top:0; z-index:20;
  }
  .topbar .back{cursor:pointer;font-size:30px;width:34px;line-height:1;font-weight:700;margin:-4px 0}
  .topbar h1{font-size:17px;margin:0;font-weight:700;flex:1;text-align:center}
  .topbar .right{min-width:26px;text-align:right;font-size:13px;opacity:.85}
  .topbar .right .tbLogout{display:inline-block;background:#fdeaea;color:#c0392b;font-weight:800;font-size:12.5px;padding:6px 11px;border-radius:999px;cursor:pointer;opacity:1;white-space:nowrap}
  .scroll{flex:1; overflow-y:auto; padding:16px 16px 90px;}
  .card{background:var(--card);border-radius:22px;padding:16px;box-shadow:var(--shadow);margin-bottom:14px;border:2px solid var(--line);}
  .sec-title{font-weight:800;font-size:15px;margin:6px 2px 12px;color:var(--green-d);}
  .muted{color:var(--muted);font-size:13px;}
  .row{display:flex;align-items:center;gap:10px;}
  .between{display:flex;align-items:center;justify-content:space-between;}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:16px;font-weight:700;}
  .btn{background:var(--green);color:#fff;padding:13px;width:100%;font-size:15px;}
  .btn:active{background:var(--green-d);}
  .btn-ghost{background:#f3f1ea;color:var(--green-d);}
  .btn-danger{background:#fdeaea;color:var(--danger);padding:8px 12px;width:auto;font-size:13px;}
  .btn-sm{padding:9px 14px;width:auto;font-size:13px;}
  input,select{font-family:inherit;font-size:15px;padding:12px;border:1px solid #dcd8cd;border-radius:11px;width:100%;background:#fbfaf6;color:var(--ink);}
  input:focus,select:focus{outline:none;border-color:var(--green-l);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .menu-card{background:#fff;border:2px solid var(--line);border-radius:22px;padding:22px 10px;text-align:center;box-shadow:var(--shadow);cursor:pointer;transition:transform .1s,border-color .1s;}
  .menu-card:active{transform:scale(.96);border-color:var(--pink);}
  .menu-card .ico{font-size:34px;}
  .menu-card .t{font-weight:800;margin-top:10px;font-size:15px;}
  .menu-card .s{color:var(--accent);font-size:12px;margin-top:4px;}
  .notice{background:var(--yellow-soft);border:2px solid #ffe27a;border-radius:18px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start;margin-bottom:18px;}
  .notice .em{font-size:24px}
  .notice b{display:block;margin-bottom:4px;color:#5d4b1f}
  .notice p{margin:0;font-size:13px;color:#6b5a2c;line-height:1.5}
  .task{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--line);}
  .task:last-child{border-bottom:none}
  .chk{width:22px;height:22px;border:2px solid #c8d0cb;border-radius:6px;flex:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:#fff;}
  .chk.on{background:var(--ok);border-color:var(--ok);}
  .task .x{margin-left:auto;color:var(--danger);opacity:.6;cursor:pointer;font-size:15px;padding:4px}
  .task.done .lbl{text-decoration:line-through;color:var(--muted)}
  .add-line{border:1.5px dashed #cfd6d0;border-radius:12px;padding:13px;text-align:center;color:var(--muted);cursor:pointer;margin-top:8px;font-weight:700;font-size:14px;}
  .list-item{background:#fff;border:1px solid var(--line);border-radius:13px;padding:15px 16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow);cursor:pointer;}
  .list-item .nm{font-weight:800;font-size:16px;color:var(--green-d)}
  .list-item .go{color:var(--accent);font-size:13px;font-weight:700}
  .pill{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:800}
  .pill.today{background:var(--green-d);color:#fff}
  .pill.on{background:#e3f3ec;color:var(--ok)}
  .pill.off{background:#f3eaea;color:var(--danger)}
  .week-nav{display:flex;align-items:center;justify-content:center;gap:18px;font-weight:800;font-size:15px;margin:2px 0 14px}
  .week-nav span{cursor:pointer;color:var(--green);font-size:20px;padding:4px 8px}
  .stat{display:flex;gap:8px;align-items:center;font-size:14px;margin:4px 0}
  .timer-big{font-size:46px;font-weight:800;text-align:center;letter-spacing:2px;font-variant-numeric:tabular-nums;color:var(--green-d);margin:10px 0}
  .bar{height:12px;background:#eee;border-radius:8px;overflow:hidden;margin-top:6px}
  .bar>i{display:block;height:100%;background:var(--green-l);border-radius:8px}
  .q-item{background:#fff;border:1px solid var(--line);border-radius:13px;padding:14px;margin-bottom:11px;box-shadow:var(--shadow)}
  .q-item .qq{font-weight:700;font-size:14px}
  .q-item .aa{background:#f1f6f3;border-radius:10px;padding:11px;margin-top:9px;font-size:13.5px;color:#2f4a3c;line-height:1.5}
  .q-item .pending{color:var(--muted);font-size:12px;margin-top:7px}
  .center{text-align:center}
  .hub-hero{background:linear-gradient(150deg,var(--green-l),var(--green-d));color:#fff;padding:30px 22px 28px;border-bottom-left-radius:34px;border-bottom-right-radius:34px;text-align:center;box-shadow:0 6px 18px rgba(31,128,73,.25)}
  .hub-hero .k{font-size:13px;font-weight:800;background:var(--pink);color:#fff;display:inline-block;padding:5px 16px;border-radius:20px}
  .hub-hero h2{font-size:28px;margin:10px 0 6px;font-weight:900;line-height:1.2}
  .hub-hero p{margin:0;font-size:12.5px;opacity:.9}
  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--green-d);color:#fff;padding:12px 20px;border-radius:30px;font-size:13.5px;font-weight:700;opacity:0;transition:.25s;z-index:100;box-shadow:0 6px 20px rgba(0,0,0,.25);white-space:nowrap}
  .toast.show{opacity:1;bottom:46px}
  .praise{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:120;pointer-events:none}
  .praise .bubble{background:#fff;border:3px solid var(--pink);border-radius:26px;padding:18px 24px;text-align:center;box-shadow:0 14px 44px rgba(214,35,127,.32);animation:pop .35s cubic-bezier(.2,1.5,.4,1)}
  .praise img{width:108px;height:108px;object-fit:contain}
  .praise .msg{font-weight:900;font-size:20px;color:var(--pink-d);margin-top:4px}
  @keyframes pop{0%{transform:scale(.4);opacity:0}100%{transform:scale(1);opacity:1}}
  @keyframes popout{to{transform:scale(.7);opacity:0}}
  .confetti{position:fixed;top:-16px;width:9px;height:14px;z-index:115;pointer-events:none;border-radius:2px;animation:fall linear forwards}
  @keyframes fall{to{transform:translateY(112vh) rotate(740deg);opacity:.8}}
  .empty{text-align:center;color:var(--muted);padding:30px 10px;font-size:13.5px}
  .modal-bg{position:fixed;inset:0;background:rgba(20,30,25,.45);display:flex;align-items:center;justify-content:center;z-index:90;padding:24px}
  .modal{background:#fff;border-radius:18px;padding:20px;width:100%;max-width:340px;box-shadow:0 20px 50px rgba(0,0,0,.3)}
  .modal h3{margin:0 0 14px;font-size:16px}
  label.fld{display:block;font-size:12.5px;font-weight:700;color:var(--muted);margin:10px 0 5px}
  .dayBtn{border:1.5px solid var(--line);background:#fff;color:var(--muted);border-radius:50%;width:36px;height:36px;font-weight:800;font-size:13px;margin-right:5px;cursor:pointer;font-family:inherit}
  .dayBtn.on{background:var(--green);color:#fff;border-color:var(--green)}
  .qBtn{border:1.5px solid var(--line);background:#fff;color:var(--muted);border-radius:9px;width:38px;height:38px;font-weight:800;font-size:13px;margin:0 5px 5px 0;cursor:pointer;font-family:inherit}
  .qBtn.on{background:var(--danger);color:#fff;border-color:var(--danger)}
  .chBtn{border:1.5px solid var(--line);background:#fff;color:var(--ink);border-radius:50%;width:40px;height:40px;font-weight:800;font-size:15px;margin:0 6px 0 0;cursor:pointer;font-family:inherit}
  .chBtn.on{background:var(--green);color:#fff;border-color:var(--green)}
  .optBtn{display:block;width:100%;text-align:left;border:1.5px solid var(--line);background:#fff;color:var(--ink);border-radius:12px;padding:12px 14px;margin:6px 0;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer}
  .optBtn.on{background:var(--green);color:#fff;border-color:var(--green)}
  .lvl-badge{display:inline-block;background:var(--green-l);color:#fff;border-radius:30px;padding:6px 16px;font-weight:800;font-size:14px}
  /* ===== 넓은 화면(PC) 관리 모드 — 좌측 사이드바 + 와이드 대시보드 ===== */
  #adminSidebar{display:none;flex-direction:column;width:248px;flex:0 0 248px;background:linear-gradient(180deg,#1f8049,#14633a);color:#fff;padding:16px 12px;overflow-y:auto;}
  #adminSidebar .sbBrand{display:flex;align-items:center;gap:10px;padding:6px 10px 16px;border-bottom:1px solid rgba(255,255,255,.18);margin-bottom:12px}
  #adminSidebar .sbBrand .bw{font-weight:900;font-size:20px;letter-spacing:-1px;line-height:1.15}
  #adminSidebar .sbBrand .bw small{display:block;font-size:11.5px;font-weight:600;opacity:.82;margin-top:2px;letter-spacing:0}
  #adminSidebar .sbItem{display:flex;align-items:center;gap:11px;padding:12px 14px;border-radius:12px;cursor:pointer;font-weight:700;font-size:14.5px;color:#eafff2;margin-bottom:2px;transition:background .12s}
  #adminSidebar .sbItem:hover{background:rgba(255,255,255,.14)}
  #adminSidebar .sbItem.on{background:#fff;color:var(--green-d);box-shadow:0 4px 12px rgba(0,0,0,.16)}
  #adminSidebar .sbItem .i{font-size:18px;width:22px;text-align:center;flex:none}
  #adminSidebar .sbSpace{flex:1;min-height:18px}
  #adminSidebar .sbFoot{border-top:1px solid rgba(255,255,255,.18);padding-top:10px;margin-top:8px}
  #adminSidebar .sbItem.out{color:#ffd7d7}
  @media(min-width:1000px){
    body.wide{justify-content:flex-start}
    body.wide #adminSidebar{display:flex;position:sticky;top:0;align-self:flex-start;height:100vh}
    body.wide #phone{max-width:none;width:auto;flex:1;min-width:0;border-radius:0;box-shadow:none}
    body.wide .scroll{display:flex;flex-wrap:wrap;gap:16px;align-content:flex-start;padding:22px 26px 48px}
    body.wide .scroll>*{flex:1 1 100%}                         /* 제목·버튼·구분선 등은 한 줄 전체 */
    body.wide .scroll>.card{flex:1 1 330px;margin-bottom:0;align-self:flex-start}   /* 카드는 여러 개 가로로 */
    body.wide .scroll>.list-item{flex:1 1 330px;margin-bottom:0}                     /* 학생 목록도 여러 줄 */
    body.wide .grid2{grid-template-columns:repeat(auto-fit,minmax(160px,1fr))}        /* 통계·메뉴는 화면폭만큼 펼침 */
    body.wide .menu-card{padding:26px 14px}
  }
</style>
</head>

/* 매쓰프로 기본 링크 — 학생 플래너 '매쓰프로 숙제' 버튼에 자동으로 걸려요 */

/* 사진을 캔버스로 줄여서 용량을 확 낮춥니다(긴 변 2000px·JPEG). 사진이 아니면 원본 그대로 */
function compressImage(file){
  return new Promise(function(resolve){
    if(!file||!/^image\//.test(file.type||"")||/heic|heif/i.test(file.type||"")){resolve(file);return;}
    var url=URL.createObjectURL(file), img=new Image();
    img.onload=function(){
      var max=2000, w=img.width, h=img.height;
      if(w>max||h>max){if(w>=h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}}
      var cv=document.createElement("canvas");cv.width=w;cv.height=h;
      try{cv.getContext("2d").drawImage(img,0,0,w,h);}catch(e){URL.revokeObjectURL(url);resolve(file);return;}
      cv.toBlob(function(blob){URL.revokeObjectURL(url);resolve(blob&&blob.size<file.size?blob:file);},"image/jpeg",0.82);
    };
    img.onerror=function(){URL.revokeObjectURL(url);resolve(file);};
    img.src=url;
  });
}
/* 파일을 클라우디너리에 올리고 다운로드 주소(URL)를 돌려줍니다 */
function uploadFile(file,tags){
  return new Promise(function(resolve,reject){
    if(!UPLOAD_READY){reject(new Error("업로드가 아직 설정되지 않았어요"));return;}
    compressImage(file).then(function(f){doUpload(f);}).catch(function(){doUpload(file);});
    function doUpload(file){
    if(file.size>20*1024*1024){reject(new Error("파일이 너무 커요 (최대 20MB). 한글파일은 용량이 크면 안 올라가요 — 사진이나 PDF로 올려주세요."));return;}
    var fd=new FormData();
    fd.append("file",file);
    fd.append("upload_preset",CLOUDINARY.uploadPreset);
    if(tags)fd.append("tags",tags); /* "keep" = 자동삭제 워커가 건너뜀(영구보관) */
    var xhr=new XMLHttpRequest();
    xhr.open("POST","https://api.cloudinary.com/v1_1/"+CLOUDINARY.cloudName+"/auto/upload");
    xhr.onload=function(){
      try{
        var r=JSON.parse(xhr.responseText);
        if(r.secure_url)resolve(r.secure_url);
        else reject(new Error((r.error&&r.error.message)||"업로드 실패"));
      }catch(e){reject(new Error("업로드 응답 오류"));}
    };
    xhr.onerror=function(){reject(new Error("네트워크 오류"));};
    xhr.send(fd);
    }
  });
}
/* 여러 장을 한 번에 골라 차례로 업로드 — 각 장마다 cb(url,name), 끝나면 done(성공수) */
function pickAndUploadMulti(cb,tags,done){
  if(!UPLOAD_READY){alert("파일 업로드가 아직 설정되지 않았어요.");return;}
  var inp=document.createElement("input");
  inp.type="file"; inp.accept="image/*,.pdf,.heic"; inp.multiple=true;
  inp.style.cssText="position:fixed;left:-9999px;top:0;opacity:0;width:1px;height:1px";
  document.body.appendChild(inp);
  var cleanup=function(){if(inp.parentNode)inp.parentNode.removeChild(inp);};
  inp.onchange=function(){
    var files=inp.files?[].slice.call(inp.files):[]; if(!files.length){cleanup();return;}
    toast(files.length+"장 올리는 중… 잠시만요 ⏳");
    var i=0,okc=0;
    (function next(){
      if(i>=files.length){cleanup();toast(okc+"장 올라갔어요 ✅");if(done)done(okc);return;}
      var f=files[i++];
      uploadFile(f,tags).then(function(url){okc++;cb(url,f.name);}).catch(function(err){toast("한 장 실패: "+err.message);}).then(next,next);
    })();
  };
  setTimeout(function(){inp.click();},0);
}

/* 효과음 (Web Audio — 파일 불필요) */
let _actx;
function chime(big){
  try{
    _actx=_actx||new (window.AudioContext||window.webkitAudioContext)();
    const ctx=_actx,now=ctx.currentTime;
    const notes=big?[523,659,784,1047,1319]:[659,880];
    notes.forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type="triangle";o.frequency.value=f;o.connect(g);g.connect(ctx.destination);
      const t=now+i*0.11;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.2,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.26);
      o.start(t);o.stop(t+0.3);
    });
  }catch(e){}
}
/* 색종이(컨페티) */
function confetti(n){
  const colors=["#d6237f","#2fa463","#ffd33f","#1FA6C2","#B5479A","#8FBE2A","#7E5AA8"];
  const ph=document.getElementById("phone"),r=ph?ph.getBoundingClientRect():{left:0,width:window.innerWidth};
  for(let i=0;i<n;i++){
    const c=document.createElement("div");c.className="confetti";
    c.style.background=colors[i%colors.length];
    c.style.left=(r.left+Math.random()*r.width)+"px";
    c.style.animationDuration=(1+Math.random()*1.3)+"s";
    c.style.transform="rotate("+Math.random()*360+"deg)";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),2500);
  }
}

function mmddOf(dstr){var b=(dstr||"").trim();if(b.length>=10)return b.slice(5);if(b.length===5)return b;return "";}
function isBirthdayToday(s){
  if(!s)return false;
  var md=mmddOf(s.bday);
  if(md&&md===todayStr().slice(5))return true;
  var nm=(s.name||"").trim(); /* 일정에 "○○ 생일"로 적어둔 경우도 인식 */
  if(nm)return (DB.events||[]).some(function(e){return e&&e.date===todayStr()&&/생일/.test(e.text||"")&&(e.text||"").indexOf(nm)>=0;});

}

function viewCalendar(){
  if(!adminAuthed)return go("adminLogin");
  var t=todayStr();
  var cm=route.cmonth||t.slice(0,7);
  var sel=route.cdate||t;
  var year=+cm.slice(0,4), month=+cm.slice(5,7);
  var startDow=new Date(year,month-1,1).getDay();
  var dim=new Date(year,month,0).getDate();
  var pad=function(n){return String(n).padStart(2,"0");};
  var dstr=function(d){return year+"-"+pad(month)+"-"+pad(d);};
  var events=toArr(DB.events);
  var evOf=function(ds){return events.filter(function(e){return e.date===ds;});};
  var wk=["일","월","화","수","목","금","토"];
  var head=wk.map(function(w,i){return '<div style="text-align:center;font-size:12px;font-weight:800;padding:4px 0;color:'+(i===0?'#d9534f':i===6?'#3a6ea5':'var(--muted)')+'">'+w+'</div>';}).join("");
  var cells="";
  for(var i=0;i<startDow;i++)cells+='<div></div>';
  for(var d=1;d<=dim;d++){
    var ds=dstr(d), evs=evOf(ds), isT=ds===t, isS=ds===sel, dow=(startDow+d-1)%7;
    var col=dow===0?'#d9534f':dow===6?'#3a6ea5':'#333';
    cells+='<div class="calCell" data-d="'+ds+'" style="min-height:48px;border-radius:9px;padding:3px 3px 2px;cursor:pointer;border:'+(isS?'2px solid var(--pink-d)':'1px solid var(--line)')+';background:'+(isT?'#fff3bf':'#fff')+'">'
      +'<div style="font-size:12.5px;font-weight:700;color:'+col+'">'+d+'</div>'
      +(evs.length?'<div style="font-size:9.5px;background:var(--pink-d);color:#fff;border-radius:6px;padding:1px 4px;margin-top:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">'+evs[0].text+(evs.length>1?' +'+(evs.length-1):'')+'</div>':'')
      +'</div>';
  }
  var selEvs=evOf(sel);
  var editEv=route.editEv?events.find(function(e){return e.id===route.editEv;}):null;
  var prevM=month===1?(year-1)+"-12":year+"-"+pad(month-1);
  var nextM=month===12?(year+1)+"-01":year+"-"+pad(month+1);
  mount(topbar("📅 일정 달력",function(){go("adminHome");},"Admin")+`
    <div class="scroll">
      <div class="between" style="margin-bottom:10px">
        <button class="btn-ghost btn-sm" id="pm">◀</button>
        <b style="font-size:16px;color:var(--green-d)">${year}년 ${month}월</b>
        <button class="btn-ghost btn-sm" id="nm">▶</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:3px;margin-bottom:4px">${head}</div>
      <div style="display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:3px">${cells}</div>
      <div class="card" style="margin-top:14px">
        <div class="sec-title">📌 ${fmtKDate(sel)} 일정</div>
        ${selEvs.length?selEvs.map(function(e,i){var multi=selEvs.length>1;
          var up=multi?(i>0?'<span class="evUp" data-id="'+e.id+'" style="cursor:pointer;padding:2px 5px;font-weight:800;color:var(--green-d)">▲</span>':'<span style="padding:2px 5px;opacity:.2">▲</span>'):'';
          var dn=multi?(i<selEvs.length-1?'<span class="evDn" data-id="'+e.id+'" style="cursor:pointer;padding:2px 5px;font-weight:800;color:var(--green-d)">▼</span>':'<span style="padding:2px 5px;opacity:.2">▼</span>'):'';
          return '<div class="between" style="padding:7px 2px;border-bottom:1px solid var(--line)"><span style="font-weight:600;flex:1">• '+e.text+'</span>'+up+dn+'<span class="evEdit" data-id="'+e.id+'" style="color:var(--green-d);cursor:pointer;padding:2px 7px;font-weight:800">✏️</span><span class="evDel" data-id="'+e.id+'" style="color:var(--danger);cursor:pointer;padding:2px 7px;font-weight:800">✕</span></div>';}).join(""):'<p class="muted" style="margin:0 0 4px">이 날 일정이 없어요.</p>'}
        ${selEvs.length>1?'<p class="muted" style="font-size:11.5px;margin:6px 0 0">▲▼ 로 그날 순서를 바꿀 수 있어요</p>':''}
        ${editEv?'<div style="font-size:12px;color:var(--green-d);font-weight:700;margin:8px 0 2px">✏️ 일정 수정 중</div>':''}
        <input id="evIn" placeholder="일정 입력 (예: 휴원일, 기말고사, 상담주간)" value="${editEv?(editEv.text||'').replace(/"/g,'&quot;'):''}" style="width:100%;padding:10px;border:1px solid #dcd8cd;border-radius:9px;background:#fbfaf6;font-family:inherit;font-size:14px;margin-top:8px">
        <button class="btn btn-sm" id="evAdd" style="width:100%;margin-top:8px">${editEv?'✏️ 수정 저장':'＋ 이 날에 일정 추가'}</button>
        ${editEv?'<button class="btn-ghost btn-sm" id="evCancel" style="width:100%;margin-top:8px">취소</button>':''}
      </div>
    </div>
  `,function(){go("adminHome");});
  app.querySelectorAll(".calCell").forEach(function(el){el.onclick=function(){go("calendar",{cmonth:cm,cdate:el.dataset.d});};});
  app.querySelector("#pm").onclick=function(){go("calendar",{cmonth:prevM,cdate:prevM+"-01"});};
  app.querySelector("#nm").onclick=function(){go("calendar",{cmonth:nextM,cdate:nextM+"-01"});};
  app.querySelector("#evAdd").onclick=function(){var v=app.querySelector("#evIn").value.trim();if(!v)return;if(!DB.events)DB.events=[];
    if(editEv){editEv.text=v;save();toast("일정 수정됨 ✏️");go("calendar",{cmonth:cm,cdate:sel});}
    else{DB.events.push({id:uid(),date:sel,text:v});save();toast("일정 추가됨 📅");render();}
  };
  function moveEv(id,dir){var same=toArr(DB.events).filter(function(e){return e.date===sel;});var pos=same.findIndex(function(e){return e.id===id;});var tgt=pos+dir;if(pos<0||tgt<0||tgt>=same.length)return;var i1=DB.events.indexOf(same[pos]),i2=DB.events.indexOf(same[tgt]);if(i1<0||i2<0)return;var tmp=DB.events[i1];DB.events[i1]=DB.events[i2];DB.events[i2]=tmp;save();render();}
  app.querySelectorAll(".evUp").forEach(function(el){el.onclick=function(){moveEv(el.dataset.id,-1);};});
  app.querySelectorAll(".evDn").forEach(function(el){el.onclick=function(){moveEv(el.dataset.id,1);};});
  app.querySelectorAll(".evEdit").forEach(function(el){el.onclick=function(){go("calendar",{cmonth:cm,cdate:sel,editEv:el.dataset.id});};});
  var evc=app.querySelector("#evCancel");if(evc)evc.onclick=function(){go("calendar",{cmonth:cm,cdate:sel});};
  app.querySelectorAll(".evDel").forEach(function(el){el.onclick=function(){DB.events=toArr(DB.events).filter(function(e){return e.id!==el.dataset.id;});save();toast("삭제됨");render();};});
}

/* 게시판 사진 큰 화면(앞·뒤로 넘기기) */
function boardLightbox(list,idx){
  if(!list||!list.length)return;
  var i=idx||0;
  var ov=document.createElement("div");
  ov.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:9999;display:flex;align-items:center;justify-content:center";
  function draw(){
    ov.innerHTML='<img src="'+bankAttr(list[i])+'" style="max-width:94%;max-height:84%;border-radius:8px">'
      +'<div id="lbX" style="position:absolute;top:14px;right:18px;color:#fff;font-size:32px;line-height:1;cursor:pointer">✕</div>'
      +(list.length>1?'<div id="lbP" style="position:absolute;left:8px;top:50%;transform:translateY(-50%);color:#fff;font-size:44px;cursor:pointer;padding:14px 10px">‹</div><div id="lbN" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);color:#fff;font-size:44px;cursor:pointer;padding:14px 10px">›</div><div style="position:absolute;bottom:22px;left:0;right:0;text-align:center;color:#fff;font-size:14px">'+(i+1)+' / '+list.length+'</div>':'');
    ov.querySelector("#lbX").onclick=close;
    var pp=ov.querySelector("#lbP");if(pp)pp.onclick=function(e){e.stopPropagation();i=(i-1+list.length)%list.length;draw();};
    var nn=ov.querySelector("#lbN");if(nn)nn.onclick=function(e){e.stopPropagation();i=(i+1)%list.length;draw();};
  }
  function close(){document.removeEventListener("keydown",key);ov.remove();}
  function key(e){if(e.key==="Escape")close();else if(e.key==="ArrowLeft"&&list.length>1){i=(i-1+list.length)%list.length;draw();}else if(e.key==="ArrowRight"&&list.length>1){i=(i+1)%list.length;draw();}}
  ov.onclick=function(e){if(e.target===ov)close();};
  document.addEventListener("keydown",key);
  draw();document.body.appendChild(ov);
}
/* 학생·학부모용 읽기 전용 학원 일정 */
function viewSchedule(){
  var role=route.role||"student";
  var sid=route.id, s=sid?findStu(sid):null;
  if(role==="parent"&&(!s||!s.parentVisible))return go("parentPick");
  if(role==="student"&&!s)return go("studentPick");
  var back=function(){ if(role==="parent")go("parentView",{id:sid}); else if(role==="public")go("hub"); else go("studentHome",{id:sid}); };
  var t=todayStr();
  var cm=route.cmonth||t.slice(0,7);
  var sel=route.cdate||"";
  var year=+cm.slice(0,4), month=+cm.slice(5,7);
  var startDow=new Date(year,month-1,1).getDay();
  var dim=new Date(year,month,0).getDate();
  var pad=function(n){return String(n).padStart(2,"0");};
  var dstr=function(d){return year+"-"+pad(month)+"-"+pad(d);};
  var events=toArr(DB.events);
  var evOf=function(ds){return events.filter(function(e){return e.date===ds;});};
  var wk=["일","월","화","수","목","금","토"];
  var head=wk.map(function(w,i){return '<div style="text-align:center;font-size:12px;font-weight:800;padding:4px 0;color:'+(i===0?'#d9534f':i===6?'#3a6ea5':'var(--muted)')+'">'+w+'</div>';}).join("");
  var cells="";
  for(var i=0;i<startDow;i++)cells+='<div></div>';
  for(var d=1;d<=dim;d++){
    var ds=dstr(d), evs=evOf(ds), isT=ds===t, isS=ds===sel, dow=(startDow+d-1)%7;
    var col=dow===0?'#d9534f':dow===6?'#3a6ea5':'#333';
    cells+='<div class="calCell" data-d="'+ds+'" style="min-width:0;height:50px;border-radius:9px;padding:4px 2px 2px;cursor:pointer;border:'+(isS?'2px solid var(--pink-d)':'1px solid var(--line)')+';background:'+(isT?'#fff3bf':'#fff')+';display:flex;flex-direction:column;align-items:center">'
      +'<div style="font-size:12.5px;font-weight:700;color:'+col+'">'+d+'</div>'
      +(evs.length?'<div style="display:flex;align-items:center;gap:2px;margin-top:5px">'+(evs.length>1?'<span style="font-size:9px;font-weight:800;color:var(--pink-d)">'+evs.length+'</span>':'')+'<span style="width:7px;height:7px;border-radius:50%;background:var(--pink-d)"></span></div>':'')
      +'</div>';
  }
  var prevM=month===1?(year-1)+"-12":year+"-"+pad(month-1);
  var nextM=month===12?(year+1)+"-01":year+"-"+pad(month+1);
  var selEvs=sel?evOf(sel):[];
  var upcoming=events.filter(function(e){return e.date>=t;}).sort(function(a,b){return a.date<b.date?-1:1;}).slice(0,8);
  mount(topbar("📅 학원 일정",back,role==="parent"?"열람":(role==="public"?"":"🎓"))+`
    <div class="scroll">
      <div class="between" style="margin-bottom:10px">
        <button class="btn-ghost btn-sm" id="pm">◀</button>
        <b style="font-size:16px;color:var(--green-d)">${year}년 ${month}월</b>
        <button class="btn-ghost btn-sm" id="nm">▶</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:3px;margin-bottom:4px">${head}</div>
      <div style="display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:3px">${cells}</div>
      ${sel?`<div class="card" style="margin-top:14px"><div class="sec-title">📌 ${fmtKDate(sel)}</div>${selEvs.length?selEvs.map(function(e){return '<div style="padding:7px 2px;border-bottom:1px solid var(--line);font-weight:600">• '+bankEsc(e.text)+'</div>';}).join(""):'<p class="muted" style="margin:0">이 날 일정이 없어요.</p>'}</div>`:''}
      <div class="card" style="margin-top:14px">
        <div class="sec-title">🗓️ 다가오는 일정</div>
        ${upcoming.length?upcoming.map(function(e){return '<div class="between" style="padding:8px 2px;border-bottom:1px solid var(--line)"><span style="font-weight:600">• '+bankEsc(e.text)+'</span><span class="muted" style="font-size:12px;white-space:nowrap">'+fmtKDate(e.date)+'</span></div>';}).join(""):'<p class="muted" style="margin:0">예정된 일정이 없어요.</p>'}
      </div>
    </div>
  `,back);
  app.querySelectorAll(".calCell").forEach(function(el){el.onclick=function(){go("schedule",{id:sid,role:role,cmonth:cm,cdate:el.dataset.d});};});
  app.querySelector("#pm").onclick=function(){go("schedule",{id:sid,role:role,cmonth:prevM});};
  app.querySelector("#nm").onclick=function(){go("schedule",{id:sid,role:role,cmonth:nextM});};
}
/* 학부모용 읽기 전용 주간 플래너 */
function viewParentPlanner(){
  var s=findStu(route.id);if(!s||!s.parentVisible)return go("parentPick");
  var d=route.date||todayStr();
  var stored=s.planner[d]||[];
  var recs=(DB.recurring||[]).filter(function(rt){return !stored.some(function(x){return x.recur===rt;});}).map(function(rt){return {text:rt,done:false,virtual:true};});
  var tasks=stored.concat(recs);
  var done=tasks.filter(function(x){return x.done;}).length;
  var isToday=d===todayStr();
  var back=function(){go("parentView",{id:s.id});};
  mount(topbar(s.name+" 주간 플래너",back,"열람")+`

        ${tasks.length?tasks.map(function(x){return '<div class="task '+(x.done?'done':'')+'"><div class="chk '+(x.done?'on':'')+'">'+(x.done?'✓':'')+'</div><div class="lbl" style="flex:1">'+bankEsc(x.text)+(x.virtual?' <span style="font-size:10px;color:var(--pink-d);font-weight:800">🔁매일</span>':'')+'</div>'+(x.link?'<a href="'+bankAttr(x.link)+'" target="_blank" rel="noopener" style="background:var(--accent);color:#fff;padding:5px 10px;border-radius:10px;font-size:11px;font-weight:800;text-decoration:none;white-space:nowrap">📎 보기</a>':'')+'</div>';}).join(""):'<div class="empty">이 날 작성된 플래너가 없어요</div>'}
      </div>
      <p class="muted center">※ 학부모 앱은 열람 전용입니다.</p>

  var shift=function(n){var dd=new Date(d+"T00:00:00");dd.setDate(dd.getDate()+n);go("parentPlanner",{id:s.id,date:ymd(dd)});};
  app.querySelector("#pd").onclick=function(){shift(-1);};
  app.querySelector("#nd").onclick=function(){shift(1);};
}

function viewAdminParents(){
  if(!adminAuthed)return go("adminLogin");
  var all=gradeNameSort((DB.students||[]).filter(canSeeStudent).filter(function(s){return !s.withdrawn;}));
  var pub=all.filter(function(s){return s.parentVisible;}).length;
  function tof(s){return classOwnerOf(s.className)||"owner";}
  function grOf(s){return (s.grade||"").trim()||"미배정";}
  function grRank(g){var lv={"초":1,"중":2,"고":3}[String(g)[0]]||9;var n=parseInt(String(g).replace(/[^0-9]/g,""))||0;return lv*100+n;}
  var teachers=Object.keys((function(){var o={};all.forEach(function(s){o[tof(s)]=1;});return o;})());
  var skipT=teachers.length<=1;
  var ptid=route.ptid||(skipT?(teachers[0]||"owner"):""), pgr=route.pgr||"";
  if(skipT&&!route.ptid)ptid=teachers[0]||"owner";
  var scope=all.filter(function(s){return !ptid||tof(s)===ptid;});
  function folder(icon,title,sub,attrs){return '<div class="pfolder" '+attrs+' style="background:#fff;border:1px solid var(--line);border-radius:13px;padding:15px 16px;margin-bottom:9px;display:flex;align-items:center;gap:12px;cursor:pointer;box-shadow:var(--shadow-sm)"><span style="font-size:24px">'+icon+'</span><div style="flex:1"><div style="font-weight:800;font-size:16px">'+title+'</div><div class="muted" style="font-size:12.5px;margin-top:2px">'+sub+'</div></div><span style="color:var(--muted);font-size:20px">›</span></div>';}
  /* 브레드크럼 */
  var bc=[];
  if(!skipT&&(ptid||pgr))bc.push('<span class="pcrumb" data-lv="root" style="color:var(--green-d);cursor:pointer">📂 전체 담임</span>');
  if(skipT&&pgr)bc.push('<span class="pcrumb" data-lv="grlist" style="color:var(--green-d);cursor:pointer">📂 학년 목록</span>');
  if(!skipT&&ptid&&pgr)bc.push('<span class="pcrumb" data-lv="tch" style="color:var(--green-d);cursor:pointer">'+teacherName(ptid)+' 선생님</span>');
  if(pgr)bc.push('<b style="color:var(--ink)">'+pgr+'</b>');

  /* 학생별 학부모 관리 카드 */
  function pCard(s){return `<div class="card" style="padding:13px 14px;margin-bottom:10px">
        <div class="between">
          <div><div style="font-weight:800;font-size:15px">${s.name}${s.grade?` <span style="font-size:12px;color:var(--green-d);font-weight:700">· ${s.grade}</span>`:''}</div>
          <div class="muted" style="font-size:13px;margin-top:3px">📞 ${s.parentPhone?`<a href="tel:${s.parentPhone}" style="color:var(--accent);text-decoration:none;font-weight:700">${s.parentPhone}</a>`:'<span style="color:#bbb">전화번호 없음</span>'}</div></div>
          <button class="btn-sm pVis ${s.parentVisible?'':'btn-ghost'}" data-id="${s.id}" style="${s.parentVisible?'':'color:var(--muted)'}">${s.parentVisible?'공개중 ✓':'비공개'}</button>
        </div>
        <button class="btn-ghost btn-sm pShare" data-id="${s.id}" style="width:100%;margin-top:10px">📲 학부모에게 앱 링크 보내기</button>
        <div style="margin-top:11px;border-top:1px solid var(--line);padding-top:10px">
          <div class="between" style="margin-bottom:7px">
            <span class="muted" style="font-size:12.5px">📅 마지막 연락: <b style="color:var(--green-d)">${s.lastContact?fmtKDate(s.lastContact):'기록 없음'}</b></span>
            <button class="btn-ghost btn-sm lcToday" data-id="${s.id}">📞 오늘 연락함</button>
          </div>
          <input type="date" class="lcDate" data-id="${s.id}" value="${s.lastContact||''}" style="width:100%;padding:8px 10px;border:1px solid #dcd8cd;border-radius:9px;background:#fbfaf6;font-family:inherit;font-size:13px">
          <label class="fld" style="display:block;margin:9px 0 3px">📝 메모 (특이사항)</label>
          <textarea class="pMemo" data-id="${s.id}" placeholder="일반 메모·특이사항 (자동 저장)" style="font-family:inherit;font-size:13.5px;padding:10px;border:1px solid #dcd8cd;border-radius:9px;width:100%;height:50px;background:#fbfaf6;resize:vertical">${s.parentMemo||""}</textarea>
          <label class="fld" style="display:block;margin:11px 0 4px">📋 상담 기록 (날짜별)</label>
          ${(s.consults||[]).slice().sort(function(a,b){return (b.date||"").localeCompare(a.date||"");}).map(function(c){return '<div class="between" style="align-items:flex-start;padding:7px 2px;border-bottom:1px dashed var(--line)"><div style="font-size:13px;line-height:1.5"><b style="color:var(--green-d)">'+fmtKDate(c.date)+'</b><br>'+bankEsc(c.text).replace(/\n/g,"<br>")+'</div><span class="cDel" data-id="'+s.id+'" data-cid="'+c.id+'" style="color:var(--danger);cursor:pointer;font-size:14px;flex:none;padding-left:8px">✕</span></div>';}).join("")||'<div class="muted" style="font-size:12px;padding:3px 0">아직 상담 기록이 없어요</div>'}

  app.querySelectorAll('.pfolder').forEach(function(el){el.onclick=function(){ if(el.dataset.go==="tch")go("adminParents",{ptid:el.dataset.tid},true); else if(el.dataset.go==="gr")go("adminParents",{ptid:ptid,pgr:el.dataset.gr},true); };});

  app.querySelectorAll(".pVis").forEach(function(el){el.onclick=function(){var s=findStu(el.dataset.id);if(!s)return;s.parentVisible=!s.parentVisible;save();toast(s.parentVisible?"학부모 공개됨":"비공개로 변경");render();};});
  app.querySelectorAll(".pShare").forEach(function(el){el.onclick=function(){var s=findStu(el.dataset.id);if(s)shareLink("parent",s);};});
  app.querySelectorAll(".lcToday").forEach(function(el){el.onclick=function(){var s=findStu(el.dataset.id);if(!s)return;s.lastContact=todayStr();save();toast("오늘 연락한 걸로 기록됐어요");render();};});
  app.querySelectorAll(".lcDate").forEach(function(el){el.onchange=function(){var s=findStu(el.dataset.id);if(!s)return;s.lastContact=el.value;save();toast("연락일 저장됨");render();};});
  app.querySelectorAll(".pMemo").forEach(function(el){el.onblur=function(){var s=findStu(el.dataset.id);if(!s)return;if((s.parentMemo||"")===el.value)return;s.parentMemo=el.value;save();toast("메모 저장됨 📝");};});
  app.querySelectorAll(".cAdd").forEach(function(el){el.onclick=function(){
    var s=findStu(el.dataset.id);if(!s)return;
    var dEl=app.querySelector('.cDate[data-id="'+el.dataset.id+'"]'), tEl=app.querySelector('.cText[data-id="'+el.dataset.id+'"]');
    var txt=(tEl.value||"").trim(); if(!txt){toast("상담 내용을 적어주세요");return;}

    save();toast("상담 기록 추가됨 📋");render();
  };});
  app.querySelectorAll(".cDel").forEach(function(el){el.onclick=function(){
    if(!confirm("이 상담 기록을 삭제할까요?"))return;
    var s=findStu(el.dataset.id);if(!s)return;

  };});

  mount(topbar("학생 관리",drillBack("adminList",dd,()=>go("adminHome")))+`
    <div class="scroll">
      <button class="btn" id="addStuList" style="margin:0 0 12px;background:var(--green);color:#fff">➕ 새 학생 등록</button>

      ${dd.level==='leaf'?`
        ${dd.leafList.length?`<button class="btn-sm" id="bulkAssign" style="width:100%;margin:0 0 10px;background:linear-gradient(135deg,#e84a8a,#f06aa0);color:#fff">📋 ${dd.pgr} 에게 한번에 과제 내주기 (${dd.leafList.length}명)</button>`:''}
        <div class="center" style="font-weight:800;color:var(--green-d);margin-bottom:6px">학부모 공개 설정 및 주간 플래너 검사</div>
        <div class="week-nav"><span id="pw">◀</span> ${lab(start)} ~ ${lab(end)} <span id="nw">▶</span></div>
        ${dd.leafList.length?dd.leafList.map(liItem).join(""):'<div class="empty">이 학년에 학생이 없어요</div>'}
      `:`
        ${dd.folders||'<div class="empty">등록된 학생이 없어요</div>'}
        ${atRoot&&outCnt?`<button class="btn-ghost btn-sm" id="outBtn" style="width:100%;margin-top:10px">🚪 퇴원 학생 보기 (${outCnt})</button>`:''}
      `}
    </div>
  `,drillBack("adminList",dd,()=>go("adminHome")));

  if(ob)ob.onclick=()=>go("adminList",{out:1});
  app.querySelectorAll(".list-item").forEach(el=>el.onclick=()=>go("adminStudent",{id:el.dataset.id}));

function openTaskModal(s,date,task){
  var editing=!!task;
  var old=document.getElementById("taskModal");if(old)old.remove();
  var inS="width:100%;padding:11px;border:1px solid #dcd8cd;border-radius:9px;background:#fbfaf6;font-size:14px;font-family:inherit";

  ov.innerHTML='<div style="background:#fff;width:100%;max-width:560px;border-radius:22px 22px 0 0;overflow:hidden;box-shadow:0 -6px 24px rgba(0,0,0,.2)">'
    +'<div style="background:linear-gradient(135deg,#2fa463,#4cc183);color:#fff;padding:16px 18px;display:flex;justify-content:space-between;align-items:center"><b style="font-size:16px">'+(editing?'✏️ 과제 수정':'📎 과제 내주기')+' · '+fmtKDate(date)+'</b><span id="tmX" style="cursor:pointer;font-size:24px;padding:0 4px">✕</span></div>'
    +'<div style="padding:16px">'
    +'<label class="fld" style="margin-top:0">과제 이름</label><input id="tmText" placeholder="예: 매쓰프로 2단원 시험, 쎈 80~95쪽" style="'+inS+'" value="'+(editing?(task.text||"").replace(/"/g,"&quot;"):"")+'">'
    +'<label class="fld" style="margin-top:11px">링크 (선택 — 매쓰프로/자료 주소)</label><input id="tmLink" placeholder="없으면 비워두세요" style="'+inS+'" value="'+(editing&&task.link?(task.link).replace(/"/g,"&quot;"):"")+'">'
    +'<button id="tmSave" class="btn" style="width:100%;margin-top:16px">'+(editing?'수정 저장':'과제 추가')+'</button>'
    +(editing?'<button id="tmDel" class="btn-danger" style="width:100%;margin-top:8px">🗑 이 과제 삭제</button>':'')
    +'<button id="tmCancel" style="width:100%;margin-top:8px;padding:12px;border:none;border-radius:11px;background:#f0eef0;color:#555;font-weight:800;font-size:15px;cursor:pointer;font-family:inherit">취소</button>'
    +'</div></div>';
  document.body.appendChild(ov);
  var close=function(){ov.remove();};
  ov.onclick=function(e){if(e.target===ov)close();};
  ov.querySelector("#tmX").onclick=close; ov.querySelector("#tmCancel").onclick=close;
  ov.querySelector("#tmSave").onclick=function(){
    var text=ov.querySelector("#tmText").value.trim();if(!text){toast("과제 이름을 입력하세요");return;}
    var link=ov.querySelector("#tmLink").value.trim();if(link&&!/^https?:\/\//i.test(link))link="https://"+link;
    if(editing){task.text=text;if(link)task.link=link;else delete task.link;}
    else{if(!s.planner[date])s.planner[date]=[];var tk={id:uid(),text:text,done:false};if(link)tk.link=link;s.planner[date].push(tk);}
    save();close();toast(editing?"과제가 수정됐어요 ✏️":"과제가 추가됐어요 📎");render();
  };
  var del=ov.querySelector("#tmDel");
  if(del)del.onclick=function(){s.planner[date]=(s.planner[date]||[]).filter(function(tk){return tk.id!==task.id;});save();close();toast("과제 삭제됨");render();};
}

/* ============================== 학생 종합 리포트 (원장→학부모) ============================== */
function buildReport(s){
  var today=new Date(todayStr()+"T00:00:00");
  function rangeRate(days){var tot=0,dn=0;for(var i=0;i<days;i++){var x=new Date(today);x.setDate(x.getDate()-i);var ts=(s.planner||{})[ymd(x)]||[];tot+=ts.length;dn+=ts.filter(function(t){return t.done;}).length;}return {tot:tot,done:dn,rate:tot?Math.round(dn/tot*100):0};}
  var att30=0;for(var i=0;i<30;i++){var x=new Date(today);x.setDate(x.getDate()-i);if((s.attendance||{})[ymd(x)])att30++;}
  var exams=[],unitWrong={};
  (DB.exams||[]).forEach(function(ex){var r=(ex.results||{})[s.id];if(r&&r.done){
    exams.push({name:ex.name,date:ex.date||"",score:r.score,nq:ex.numQ,wrong:(r.wrong||[]).length});
    if(ex.qs&&ex.qs.length)(r.wrong||[]).forEach(function(qn){var q=ex.qs[qn-1];var u=q&&q.unit?q.unit:null;if(u)unitWrong[u]=(unitWrong[u]||0)+1;});
  }});
  exams.sort(function(a,b){return a.date.localeCompare(b.date);});
  var avg=exams.length?Math.round(exams.reduce(function(a,b){return a+b.score;},0)/exams.length):null;
  var weak=Object.keys(unitWrong).map(function(u){return {unit:u,cnt:unitWrong[u]};}).sort(function(a,b){return b.cnt-a.cnt;}).slice(0,3);
  return {attMonth:attCount(s),att30:att30,r7:rangeRate(7),r30:rangeRate(30),exams:exams,avg:avg,weak:weak};
}
function reportSummaryText(s,d){
  var L=[];
  L.push("[채수학교습소] "+s.name+" 학습 리포트 ("+todayStr()+")");
  L.push("· 이번 달 출석: "+d.attMonth+"일");
  L.push("· 최근 30일 과제 성실도: "+d.r30.rate+"% ("+d.r30.done+"/"+d.r30.tot+")");
  if(d.avg!=null)L.push("· 시험 평균: "+d.avg+"점 ("+d.exams.length+"회 응시)");
  if(d.weak.length)L.push("· 보강 필요 단원: "+d.weak.map(function(w){return w.unit;}).join(", "));

    +'h1{font-size:20px;margin:18px 0 4px}.sub{color:#666;font-size:13px;margin-bottom:18px}'

    +'.box .big{font-size:22px;font-weight:900}.box .row{display:flex;justify-content:space-between;font-size:13px;margin:3px 0}'
    +'.bar{height:11px;background:#eee;border-radius:7px;overflow:hidden;margin-top:5px}.bar>i{display:block;height:100%;border-radius:7px}'

}

function gradeLevelsFor(g){return Object.keys(CURRICULUM[g]||{});}
function unitsFor(g,gl){return Object.keys((CURRICULUM[g]||{})[gl]||{});}
function subUnitsFor(g,gl,unit){var u=(CURRICULUM[g]||{})[gl]||{};return (u[unit]||[]).slice();}
function curGradeOf(gl){ // 세부학년/과목 → 초/중/고
  for(var g in CURRICULUM){ if(CURRICULUM[g][gl])return g; } return "";
}

let bankSel={}; /* {문제id:true} — 학습지/출제용 선택 상태 */
function bankEsc(t){return String(t==null?"":t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function bankAttr(t){return bankEsc(t).replace(/"/g,"&quot;");}
function typesetMath(){try{if(window.MathJax&&MathJax.typesetPromise)MathJax.typesetPromise([app]);}catch(e){}}
function bankLvlColor(l){return ["#9aa69a","#4cc183","#2fa463","#f5b91c","#ef9a3d","#d6237f"][Number(l)]||"#9aa69a";}
function bankLvlLabel(l){return "★".repeat(Number(l)||0)+"☆".repeat(5-(Number(l)||0));}
function bankSelIds(){return Object.keys(bankSel).filter(function(id){return bankSel[id]&&(DB.bank||[]).some(function(q){return q.id===id;});});}
function bankItemsByIds(ids){var m={};(DB.bank||[]).forEach(function(q){m[q.id]=q;});return ids.map(function(id){return m[id];}).filter(Boolean);}
function bankBadge(txt,color,soft){return '<span class="pill" style="background:'+(soft||"#eef")+';color:'+(color||"#333")+';font-size:11px;margin-right:5px">'+bankEsc(txt)+'</span>';}

function viewBank(){
  if(!adminAuthed)return go("adminLogin");
  var bg=route.bg||"중";
  var gl=route.gl||"전체";
  var lvl=route.lvl||"전체";
  var unit=route.unit||"전체";
  var all=(DB.bank||[]).filter(function(q){return q.grade===bg;});
  var gls=[]; all.forEach(function(q){var x=(q.gradeLevel||"").trim(); if(x&&gls.indexOf(x)<0)gls.push(x);});
  var glOrder=gradeLevelsFor(bg); gls.sort(function(a,b){return glOrder.indexOf(a)-glOrder.indexOf(b);});
  var sub=route.sub||"전체";

  var units=[]; glFiltered.forEach(function(q){var u=(q.unit||"").trim(); if(u&&units.indexOf(u)<0)units.push(u);}); units.sort(function(a,b){return a.localeCompare(b,"ko");});
  var unitFiltered=(unit==="전체")?glFiltered:glFiltered.filter(function(q){return (q.unit||"").trim()===unit;});
  var subs=[]; unitFiltered.forEach(function(q){var s=(q.subUnit||"").trim(); if(s&&subs.indexOf(s)<0)subs.push(s);}); subs.sort(function(a,b){return a.localeCompare(b,"ko");});
  var list=unitFiltered.filter(function(q){
    if(sub!=="전체"&&(q.subUnit||"").trim()!==sub)return false;
    if(lvl!=="전체"&&String(q.level)!==String(lvl))return false;
    return true;
  }).slice().reverse();
  var grTab=function(g,lab){return '<button class="bgTab btn-sm '+(g===bg?'btn':'btn-ghost')+'" data-g="'+g+'" style="flex:1">'+lab+'</button>';};
  var lvTab=function(v,lab){return '<button class="bLvTab btn-sm '+(String(v)===String(lvl)?'btn':'btn-ghost')+'" data-l="'+v+'" style="flex:none;padding:7px 11px">'+lab+'</button>';};
  var card=function(q){
    var sel=!!bankSel[q.id];
    var snip=bankEsc((q.qText||"").slice(0,80))||'<span class="muted">(본문 없음)</span>';
    var search=bankAttr(((q.unit||"")+" "+(q.qText||"")+" "+(q.tags||[]).join(" ")).toLowerCase());
    return '<div class="q-item bankCard" data-s="'+search+'" style="display:flex;gap:10px;align-items:flex-start">'
      +'<div class="chk bankChk '+(sel?'on':'')+'" data-id="'+q.id+'">'+(sel?'✔':'')+'</div>'
      +'<div style="flex:1;cursor:pointer;min-width:0" class="bankOpen" data-id="'+q.id+'">'

    +unitsFor(bg,treeGL).map(function(u){

      return '<div class="card" style="padding:12px 14px;margin-bottom:8px"><div class="between"><b style="color:var(--green-d);font-size:15px">'+bankEsc(u)+'</b><span style="display:flex;align-items:center;gap:7px"><span class="muted" style="font-size:12px">'+uc+'문제</span><button class="btn-sm treeAdd" data-u="'+bankAttr(u)+'" data-s="" style="background:var(--green);color:#fff">➕ 만들기</button></span></div>'
        +slist.map(function(s){var sc=bankCount(u,s);return '<div class="between" style="padding:8px 2px 0 12px;border-top:1px solid var(--line);margin-top:8px"><span style="font-size:13.5px;color:#566">· '+bankEsc(s)+'</span><span style="display:flex;align-items:center;gap:7px"><span class="muted" style="font-size:11.5px">'+sc+'</span><button class="btn-ghost btn-sm treeAdd" data-u="'+bankAttr(u)+'" data-s="'+bankAttr(s)+'">➕ 만들기</button></span></div>';}).join("")
        +'</div>';
    }).join("");
  var listHTML=`
      <div class="card" style="padding:12px">
        <label class="fld" style="margin-top:0">학년 / 과정</label>
        <select id="bGL">${["전체"].concat(gls).map(function(x){return '<option'+(x===gl?' selected':'')+'>'+bankEsc(x)+'</option>';}).join("")}</select>
        <label class="fld">단원</label>
        <select id="bUnit">${["전체"].concat(units).map(function(u){return '<option'+(u===unit?' selected':'')+'>'+bankEsc(u)+'</option>';}).join("")}</select>
        <label class="fld">소단원</label>
        <select id="bSub">${["전체"].concat(subs).map(function(x){return '<option'+(x===sub?' selected':'')+'>'+bankEsc(x)+'</option>';}).join("")}</select>
        <label class="fld">난이도</label>
        <div style="display:flex;gap:5px;flex-wrap:wrap">${lvTab("전체","전체")}${[1,2,3,4,5].map(function(v){return lvTab(v,"★"+v);}).join("")}</div>
        <label class="fld">검색</label>
        <input id="bSearch" placeholder="문제 내용·태그로 빠르게 찾기" />
      </div>
      <div class="between" style="margin:4px 2px 8px"><span class="muted" style="font-size:12.5px">${list.length}문제</span><span class="muted" style="font-size:12px">제목/본문을 누르면 수정</span></div>
      <div id="bankList">${list.length?list.map(card).join(""):'<div class="empty">이 조건의 문제가 없어요.<br>📋 단원별에서 ➕ 만들기로 채워보세요.</div>'}</div>
      <div style="position:sticky;bottom:0;background:linear-gradient(rgba(254,249,230,0),var(--cream) 40%);padding:12px 0 4px;margin-top:4px">
        <button class="btn" id="mkSheet">📄 선택한 <span id="selN">${bankSelIds().length}</span>개로 학습지 만들기</button>
        <button class="btn" id="mkPractice" style="margin-top:8px;background:linear-gradient(135deg,#1f8049,#2fa463)">📝 연습문제 내주기 (객관식·단답 자동채점)</button>
        <button class="btn" id="mkExam" style="margin-top:8px;background:linear-gradient(135deg,#b81668,#e84a8a)">📤 시험으로 출제 (객관식 자동채점)</button>
        <div class="row" style="margin-top:8px">
          <button class="btn-ghost btn-sm" id="selAll" style="flex:1">현재 목록 전체선택</button>
          <button class="btn-ghost btn-sm" id="selClr" style="flex:1">선택 해제</button>
        </div>
      </div>`;
  mount(topbar("📚 문제은행",function(){go("pcDash");},"Admin")+`
    <div class="scroll">
      <div class="row" style="margin-bottom:10px">
        <button class="btn btn-sm" id="bankAdd" style="flex:1">➕ 문제 추가</button>
      </div>
      <div class="row" style="margin-bottom:10px">${grTab("초","초등")}${grTab("중","중등")}${grTab("고","고등")}</div>
      <div class="row" style="margin-bottom:10px;gap:6px">
        <button class="btn-sm mtab ${tab==='tree'?'btn':'btn-ghost'}" data-t="tree" style="flex:1">📋 단원별</button>
        <button class="btn-sm mtab ${tab==='list'?'btn':'btn-ghost'}" data-t="list" style="flex:1">📚 전체 문제</button>
        <button class="btn-sm mtab btn-ghost" data-t="practice" style="flex:1">📝 연습 결과</button>
      </div>
      ${tab==='tree'?('<p class="muted" style="font-size:12.5px;margin:0 2px 8px">단원·소단원 줄의 <b>➕ 만들기</b>를 누르면 그 단원으로 바로 문제를 추가해요.</p>'+treeHTML):listHTML}
    </div>
  `,function(){go("pcDash");});
  typesetMath();
  app.querySelectorAll(".bgTab").forEach(function(el){el.onclick=function(){go("bank",{bg:el.dataset.g,tab:tab,gl:"전체"});};});
  app.querySelectorAll(".mtab").forEach(function(el){el.onclick=function(){var t=el.dataset.t;if(t==="practice"){go("adminPractices");return;}go("bank",{bg:bg,tab:t,gl:gl});};});
  app.querySelector("#bankAdd").onclick=function(){go("bankAdd",{bg:bg});};
  var biBtn=app.querySelector("#bankImport"); if(biBtn)biBtn.onclick=function(){go("bankImport",{bg:bg});};
  if(tab==="tree"){
    var glt=app.querySelector("#bGLtree"); if(glt)glt.onchange=function(){go("bank",{bg:bg,tab:"tree",gl:this.value});};

    app.querySelector("#bGL").onchange=function(){go("bank",{bg:bg,tab:"list",gl:this.value,unit:"전체",lvl:lvl});};
    app.querySelector("#bUnit").onchange=function(){go("bank",{bg:bg,tab:"list",gl:gl,unit:this.value,lvl:lvl});};
    app.querySelector("#bSub").onchange=function(){go("bank",{bg:bg,tab:"list",gl:gl,unit:unit,sub:this.value,lvl:lvl});};
    app.querySelectorAll(".bLvTab").forEach(function(el){el.onclick=function(){go("bank",{bg:bg,tab:"list",gl:gl,unit:unit,sub:sub,lvl:el.dataset.l});};});
    app.querySelectorAll(".bankOpen").forEach(function(el){el.onclick=function(){go("bankAdd",{eid:el.dataset.id,bg:bg});};});
    var updN=function(){var el=app.querySelector("#selN");if(el)el.textContent=bankSelIds().length;};
    app.querySelectorAll(".bankChk").forEach(function(el){el.onclick=function(){var id=el.dataset.id;if(bankSel[id]){delete bankSel[id];el.classList.remove("on");el.textContent="";}else{bankSel[id]=true;el.classList.add("on");el.textContent="✔";}updN();};});
    app.querySelector("#selAll").onclick=function(){list.forEach(function(q){bankSel[q.id]=true;});go("bank",{bg:bg,tab:"list",gl:gl,unit:unit,sub:sub,lvl:lvl});};
    app.querySelector("#selClr").onclick=function(){bankSel={};go("bank",{bg:bg,tab:"list",gl:gl,unit:unit,sub:sub,lvl:lvl});};
    app.querySelector("#mkSheet").onclick=function(){if(!bankSelIds().length){toast("문제를 먼저 선택하세요 (왼쪽 네모 체크)");return;}go("bankSheet",{bg:bg});};
    app.querySelector("#mkPractice").onclick=function(){if(!bankSelIds().length){toast("문제를 먼저 선택하세요 (왼쪽 네모 체크)");return;}go("bankPractice",{bg:bg});};
    app.querySelector("#mkExam").onclick=function(){if(!bankSelIds().length){toast("문제를 먼저 선택하세요 (왼쪽 네모 체크)");return;}go("bankAssign",{bg:bg});};
    var sb=app.querySelector("#bSearch");
    if(sb)sb.oninput=function(){var v=this.value.trim().toLowerCase();app.querySelectorAll(".bankCard").forEach(function(c){c.style.display=(!v||c.dataset.s.indexOf(v)>=0)?"":"none";});};
  }
}

function viewBankAdd(){
  if(!adminAuthed)return go("adminLogin");
  var editing=!!route.eid;
  var q=editing?(DB.bank||[]).find(function(x){return x.id===route.eid;}):null;
  if(editing&&!q)return go("bank");
  var g=q?q.grade:(route.bg||"중");
  var lvl=q?q.level:3;
  var qtype=q?q.qtype:"객관식";
  var choicesTxt=q?(q.choices||[]).join("\n"):"";
  var bg=route.bg||g;
  var selGL=q?(q.gradeLevel||""):(route.preGL||"");
  var curGL=(selGL&&gradeLevelsFor(g).indexOf(selGL)>=0)?selGL:(gradeLevelsFor(g)[0]||"");
  var unitList=unitsFor(g,curGL);
  var selUnit=q?(q.unit||""):(route.preUnit||"");
  var unitIsCustom=!!(selUnit&&unitList.indexOf(selUnit)<0);
  var curUnit=selUnit||(unitList[0]||"");
  var subList=subUnitsFor(g,curGL,curUnit);
  var selSub=q?(q.subUnit||""):(route.preSub||"");
  var subIsCustom=!!(selSub&&subList.indexOf(selSub)<0);
  mount(topbar(editing?"문제 수정":"문제 추가",function(){go("bank",{bg:bg});})+`
    <div class="scroll">
      <div class="card">
        <label class="fld" style="margin-top:0">학년</label>
        <div class="row">${["초","중","고"].map(function(x){return '<button type="button" class="baGr btn-sm '+(x===g?'btn':'btn-ghost')+'" data-g="'+x+'" style="flex:1">'+x+'등</button>';}).join("")}</div>
        <input type="hidden" id="baG" value="${g}">
        <label class="fld">학년 / 과정</label>
        <select id="baGL">${gradeLevelsFor(g).map(function(gl){return '<option'+(gl===curGL?' selected':'')+'>'+gl+'</option>';}).join("")}</select>
        <label class="fld">단원 *</label>
        <select id="baUnitSel">${unitList.map(function(u){return '<option'+((!unitIsCustom&&selUnit===u)?' selected':'')+'>'+bankEsc(u)+'</option>';}).join("")}<option value="__custom__"${unitIsCustom?' selected':''}>✏️ 기타(직접 입력)</option></select>
        <input id="baUnit" placeholder="단원 직접 입력" value="${bankAttr(unitIsCustom?selUnit:'')}" style="margin-top:8px;${unitIsCustom?'':'display:none'}">
        <label class="fld">소단원 (선택)</label>
        <select id="baSubSel"><option value="">(소단원 없음)</option>${subList.map(function(s){return '<option'+((!subIsCustom&&selSub===s)?' selected':'')+'>'+bankEsc(s)+'</option>';}).join("")}<option value="__custom__"${subIsCustom?' selected':''}>✏️ 기타(직접 입력)</option></select>
        <input id="baSub" placeholder="소단원 직접 입력" value="${bankAttr(subIsCustom?selSub:'')}" style="margin-top:8px;${subIsCustom?'':'display:none'}">
        <label class="fld">난이도</label>
        <div class="row" id="baLvWrap">${[1,2,3,4,5].map(function(v){return '<button type="button" class="baLv btn-sm '+(v===lvl?'btn':'btn-ghost')+'" data-l="'+v+'" style="flex:1">★'+v+'</button>';}).join("")}</div>
        <input type="hidden" id="baLv" value="${lvl}">
        <label class="fld">유형</label>
        <div class="row" id="baTypeWrap">${["객관식","단답","서술"].map(function(t){return '<button type="button" class="baType btn-sm '+(t===qtype?'btn':'btn-ghost')+'" data-t="'+t+'" style="flex:1">'+t+'</button>';}).join("")}</div>
        <input type="hidden" id="baType" value="${qtype}">
      </div>
      <div class="card">
        <label class="fld" style="margin-top:0">문제 본문 *</label>
        <p class="muted" style="font-size:11.5px;margin:0 0 6px">수식은 달러기호로 감싸요. 예: <b>$x^2+3x-4=0$</b>, 분수 <b>$\\frac{1}{2}$</b></p>
        <textarea id="baText" style="font-family:inherit;font-size:14px;padding:12px;border:1px solid #dcd8cd;border-radius:11px;width:100%;height:100px;background:#fbfaf6;resize:vertical">${bankEsc(q?q.qText:'')}</textarea>
        <div id="baImgWrap" style="margin-top:10px">${q&&q.qImg?'<img src="'+bankAttr(q.qImg)+'" style="max-width:100%;border-radius:10px;border:1px solid var(--line)">':''}</div>
        <input type="hidden" id="baImg" value="${bankAttr(q?q.qImg:'')}">
        <button type="button" class="btn-ghost btn-sm" id="baUpImg" style="width:100%;margin-top:8px">📷 문제 사진 ${q&&q.qImg?'바꾸기':'올리기'} (그래프·도형용)</button>
        ${q&&q.qImg?'<button type="button" class="btn-ghost btn-sm" id="baRmImg" style="width:100%;margin-top:6px;color:var(--danger)">사진 제거</button>':''}
      </div>
      <div class="card" id="baChoiceCard" style="${qtype==="객관식"?'':'display:none'}">
        <label class="fld" style="margin-top:0">보기 (한 줄에 하나씩 — 선택)</label>
        <textarea id="baChoices" style="font-family:inherit;font-size:14px;padding:12px;border:1px solid #dcd8cd;border-radius:11px;width:100%;height:90px;background:#fbfaf6;resize:vertical" placeholder="① ② ③ 내용을 한 줄씩\n예)\n$x=1$\n$x=2$">${bankEsc(choicesTxt)}</textarea>
      </div>
      <div class="card">
        <label class="fld" style="margin-top:0">정답</label>
        <input id="baAnswer" placeholder="객관식이면 번호(예: 3), 단답이면 값" value="${bankAttr(q?q.answer:'')}">
        <label class="fld">해설 (선택)</label>
        <textarea id="baSol" style="font-family:inherit;font-size:14px;padding:12px;border:1px solid #dcd8cd;border-radius:11px;width:100%;height:70px;background:#fbfaf6;resize:vertical">${bankEsc(q?q.solution:'')}</textarea>
        <label class="fld">태그 (선택, 쉼표로 구분)</label>
        <input id="baTags" placeholder="예: 기말대비, 함정문제" value="${bankAttr(q?(q.tags||[]).join(", "):'')}">
      </div>
      <button class="btn" id="baSave">${editing?'수정 저장':'문제 저장'}</button>
      ${editing?'<button class="btn-danger" id="baDel" style="width:100%;margin-top:10px">이 문제 삭제</button>':''}
      <div style="height:20px"></div>
    </div>
  `,function(){go("bank",{bg:bg});});
  typesetMath();
  function baToggleCustom(){var sel=app.querySelector("#baUnitSel"),inp=app.querySelector("#baUnit");inp.style.display=(sel.value==="__custom__")?"":"none";}
  function curUnitVal(){var sel=app.querySelector("#baUnitSel");return sel.value==="__custom__"?app.querySelector("#baUnit").value.trim():sel.value;}
  function baSubToggle(){var sel=app.querySelector("#baSubSel"),inp=app.querySelector("#baSub");inp.style.display=(sel.value==="__custom__")?"":"none";}
  function baRebuildSub(){var g=app.querySelector("#baG").value,gl=app.querySelector("#baGL").value;app.querySelector("#baSubSel").innerHTML='<option value="">(소단원 없음)</option>'+subUnitsFor(g,gl,curUnitVal()).map(function(s){return '<option>'+bankEsc(s)+'</option>';}).join("")+'<option value="__custom__">✏️ 기타(직접 입력)</option>';baSubToggle();}
  function baRebuildUnits(){var g=app.querySelector("#baG").value,gl=app.querySelector("#baGL").value;app.querySelector("#baUnitSel").innerHTML=unitsFor(g,gl).map(function(u){return '<option>'+bankEsc(u)+'</option>';}).join("")+'<option value="__custom__">✏️ 기타(직접 입력)</option>';baToggleCustom();baRebuildSub();}
  function baRebuildGL(){var g=app.querySelector("#baG").value;app.querySelector("#baGL").innerHTML=gradeLevelsFor(g).map(function(gl){return '<option>'+gl+'</option>';}).join("");baRebuildUnits();}
  app.querySelectorAll(".baGr").forEach(function(el){el.onclick=function(){app.querySelectorAll(".baGr").forEach(function(b){b.classList.remove("btn");b.classList.add("btn-ghost");});el.classList.add("btn");el.classList.remove("btn-ghost");app.querySelector("#baG").value=el.dataset.g;baRebuildGL();};});
  app.querySelector("#baGL").onchange=baRebuildUnits;
  app.querySelector("#baUnitSel").onchange=function(){baToggleCustom();baRebuildSub();};
  app.querySelector("#baUnit").oninput=baRebuildSub;
  app.querySelector("#baSubSel").onchange=baSubToggle;
  app.querySelectorAll(".baLv").forEach(function(el){el.onclick=function(){app.querySelectorAll(".baLv").forEach(function(b){b.classList.remove("btn");b.classList.add("btn-ghost");});el.classList.add("btn");el.classList.remove("btn-ghost");app.querySelector("#baLv").value=el.dataset.l;};});
  app.querySelectorAll(".baType").forEach(function(el){el.onclick=function(){app.querySelectorAll(".baType").forEach(function(b){b.classList.remove("btn");b.classList.add("btn-ghost");});el.classList.add("btn");el.classList.remove("btn-ghost");app.querySelector("#baType").value=el.dataset.t;app.querySelector("#baChoiceCard").style.display=(el.dataset.t==="객관식")?"":"none";};});
  app.querySelector("#baUpImg").onclick=function(){pickAndUpload(function(url){app.querySelector("#baImg").value=url;app.querySelector("#baImgWrap").innerHTML='<img src="'+url+'" style="max-width:100%;border-radius:10px;border:1px solid var(--line)">';toast("사진이 올라갔어요 ✅");},"keep");};
  var rm=app.querySelector("#baRmImg");if(rm)rm.onclick=function(){app.querySelector("#baImg").value="";app.querySelector("#baImgWrap").innerHTML="";rm.style.display="none";};
  app.querySelector("#baSave").onclick=function(){
    var text=app.querySelector("#baText").value.trim();
    var usel=app.querySelector("#baUnitSel").value;
    var unit=usel==="__custom__"?app.querySelector("#baUnit").value.trim():usel;
    if(!unit){toast("단원을 선택하거나 직접 입력하세요");return;}
    if(!text&&!app.querySelector("#baImg").value){toast("문제 본문이나 사진이 필요해요");return;}
    var type=app.querySelector("#baType").value;
    var choices=type==="객관식"?app.querySelector("#baChoices").value.split("\n").map(function(x){return x.trim();}).filter(Boolean):[];
    var tags=app.querySelector("#baTags").value.split(",").map(function(x){return x.trim();}).filter(Boolean);
    var subSel=app.querySelector("#baSubSel").value;
    var subUnit=subSel==="__custom__"?app.querySelector("#baSub").value.trim():subSel;
    var data={grade:app.querySelector("#baG").value,gradeLevel:app.querySelector("#baGL").value,unit:unit,subUnit:subUnit,level:Number(app.querySelector("#baLv").value)||3,qtype:type,qText:text,qImg:app.querySelector("#baImg").value,choices:choices,answer:app.querySelector("#baAnswer").value.trim(),solution:app.querySelector("#baSol").value.trim(),tags:tags};
    if(editing){Object.keys(data).forEach(function(k){q[k]=data[k];});save();toast("수정되었어요 ✏️");}
    else{data.id=uid();data.source="내자료";data.created=todayStr();if(!DB.bank)DB.bank=[];DB.bank.push(data);save();toast("문제가 저장됐어요 ✅");}
    go("bank",{bg:data.grade});
  };
  var del=app.querySelector("#baDel");if(del)del.onclick=function(){if(confirm("이 문제를 삭제할까요?")){DB.bank=DB.bank.filter(function(x){return x.id!==q.id;});delete bankSel[q.id];save();toast("삭제됨");go("bank",{bg:bg});}};
}

  var bg=route.bg||"중";
  var gl=route.gl||gradeLevelsFor(bg)[0]||"";
  var unitList=unitsFor(bg,gl);
  var unit=route.unit||unitList[0]||"";

function viewExamResult(){
  if(!adminAuthed)return go("adminLogin");
  var ex=findExam(route.examId);if(!ex)return go("adminExams");
  var s=findStu(route.sid);if(!s)return go("adminExam",{id:ex.examId});
  var r=ex.results[s.id]||{wrong:[],score:0};
  var wrongSet=(r.wrong||[]).slice();
  var hasEssay=ex.answerKey.some(function(k){return k==="E";});
  var objNums=[],essayNums=[];ex.answerKey.forEach(function(k,i){if(k==="E")essayNums.push(i+1);else if(k!=null)objNums.push(i+1);});
  var objWrong=wrongSet.filter(function(q){return objNums.indexOf(q)>-1;});
  var objCorrect=objNums.length-objWrong.length;
  var qbtns='';for(var i=1;i<=ex.numQ;i++){var isE=ex.answerKey[i-1]==="E";qbtns+='<button type="button" class="qBtn '+(wrongSet.indexOf(i)>-1?'on':'')+'" data-q="'+i+'"'+(isE?' style="border-color:#a9791b" title="서술형"':'')+'>'+i+(isE?'<span style="font-size:9px">✏️</span>':'')+'</button>';}
  mount(topbar(s.name+" 결과 입력",function(){go("adminExam",{id:ex.id});})+`
    <div class="scroll">
      <div class="card">
        <div style="font-weight:800">${ex.name}</div>
        <div class="muted" style="font-size:12px;margin-top:3px">${ex.numQ}문항${essayNums.length?' (객관식 '+objNums.length+' · 서술형 '+essayNums.length+')':''}</div>
        ${(objNums.length&&(r.done||r.submitted))?`<div style="margin-top:10px;padding:10px 12px;background:#eafaf0;border-radius:10px;font-size:13px"><b>✅ 객관식 자동 채점:</b> ${objNums.length}개 중 <b style="color:var(--ok)">${objCorrect}개 정답</b>${objWrong.length?` <span class="muted">(틀림: ${objWrong.map(function(q){return q+'번';}).join(', ')})</span>`:''}${essayNums.length?'<br><span style="color:#a9791b;font-weight:600">✏️ 서술형만 사진 보고 채점하면 돼요.</span>':''}</div>`:''}
      </div>
      <div class="card">
        <div class="sec-title">❌ 틀린 문항을 눌러서 선택</div>
        <div id="qGrid" style="margin-top:4px">${qbtns}</div>
        ${hasEssay?'<p class="muted" style="margin:10px 0 0;color:#a9791b;font-weight:600;font-size:12px">✏️ 표시는 서술형 문항이에요. 아래 학생 사진을 보고, 틀린 문항을 눌러 선택하거나 점수를 직접 입력하세요.</p>':'<p class="muted" style="margin:10px 0 0">선택한 문항 수에 따라 점수가 자동 계산돼요. (직접 점수 입력도 가능)</p>'}
        <label class="fld">점수 (자동 계산됨, 직접 수정 가능)</label>
        <input id="exScore" type="number" inputmode="numeric" min="0" max="100" value="${r.done?r.score:''}" placeholder="자동" />
      </div>
      ${(r.answerPhotos&&r.answerPhotos.length)?`<div class="card"><div class="sec-title">📷 학생 서술형 답안</div><div style="margin-top:4px">${r.answerPhotos.map(function(u){return '<a href="'+bankAttr(u)+'" target="_blank" rel="noopener" style="display:inline-block;margin:0 6px 6px 0"><img src="'+bankAttr(u)+'" style="width:92px;height:92px;object-fit:cover;border-radius:8px;border:1px solid var(--line)"></a>';}).join("")}</div><p class="muted" style="font-size:11.5px;margin:6px 0 0">사진을 누르면 크게 봐요. 보고 점수를 입력하세요.</p></div>`:''}
      <button class="btn" id="resSave">결과 저장</button>
      ${r.done?'<button class="btn-danger" id="resClr" style="width:100%;margin-top:8px">이 학생 결과 삭제</button>':''}
    </div>
  `,function(){go("adminExam",{id:ex.id});});
  function recalc(){var w=[].slice.call(app.querySelectorAll(".qBtn.on")).length;var sc=ex.numQ?Math.round((ex.numQ-w)/ex.numQ*100):0;app.querySelector("#exScore").value=sc;}
  app.querySelectorAll(".qBtn").forEach(function(el){el.onclick=function(){el.classList.toggle("on");recalc();};});
  app.querySelector("#resSave").onclick=function(){
    var wrong=[].slice.call(app.querySelectorAll(".qBtn.on")).map(function(el){return +el.dataset.q;}).sort(function(a,b){return a-b;});
    var sv=app.querySelector("#exScore").value;
    var score=sv===""?(ex.numQ?Math.round((ex.numQ-wrong.length)/ex.numQ*100):0):Math.max(0,Math.min(100,+sv));
    ex.results[s.id]={wrong:wrong,score:score,by:"admin",done:true,answerPhotos:(r.answerPhotos||[])};save();toast("결과 저장됨");go("adminExam",{id:ex.id});
  };
  var clr=app.querySelector("#resClr");
  if(clr)clr.onclick=function(){delete ex.results[s.id];save();toast("삭제됨");go("adminExam",{id:ex.id});};
}

function hms(sec){const h=String(Math.floor(sec/3600)).padStart(2,"0");const m=String(Math.floor(sec%3600/60)).padStart(2,"0");const s=String(sec%60).padStart(2,"0");return `${h}:${m}:${s}`;}
function attCount(s){const a=s.attendance||{};const m=todayStr().slice(0,7);return Object.keys(a).filter(d=>a[d]&&d.startsWith(m)).length;}
function enrollElapsed(dateStr){if(!dateStr)return "";const start=new Date(dateStr+"T00:00:00"),now=new Date(todayStr()+"T00:00:00");const days=Math.floor((now-start)/86400000);if(days<0)return "곧 수강 시작";const mon=Math.floor(days/30);return mon>0?("수강 "+mon+"개월째 ("+days+"일)"):("수강 "+days+"일째");}
/* ===== 시험/오답 분석 ===== */
function stuName(id){var s=findStu(id);return s?s.name:"(삭제된 학생)";}
function findExam(id){return (DB.exams||[]).find(function(x){return x.id===id;});}
function examVisibleTo(ex,s){
  var t=ex.assignType||"all", vals=ex.assignVals||[];
  if(t==="all"||!vals.length)return true;
  if(t==="grade")return vals.indexOf((s.grade||"").trim())>-1;
  if(t==="class")return vals.indexOf((s.className||"").trim())>-1;
  if(t==="students")return vals.indexOf(s.id)>-1;
  return true;
}
function examKeyKind(ex){var obj=0,ess=0;(ex.answerKey||[]).forEach(function(k){if(k==="E")ess++;else if(k!=null)obj++;});return {obj:obj,ess:ess};}
function examGradeLabel(ex){var k=examKeyKind(ex);if(k.obj&&k.ess)return "객관식 "+k.obj+"개 자동채점 + 서술형 "+k.ess+"개 원장채점";if(k.obj)return "객관식 "+k.obj+"개 자동채점 ✅";if(k.ess)return "서술형 "+k.ess+"개 · 원장 채점";return "원장이 직접 채점";}
function isImgUrl(u){u=String(u||"");if(/\.(pdf|hwp|hwpx|docx?|pptx?|zip)(\?|$)/i.test(u))return false;return /\.(png|jpe?g|gif|webp|bmp|heic|heif)(\?|$)/i.test(u)||/\/image\/upload\//.test(u);}
function paperThumb(p){var u=(p&&p.url)||p;if(isImgUrl(u))return '<img src="'+bankAttr(u)+'" style="width:78px;height:78px;object-fit:cover;border-radius:9px;border:1px solid var(--line)">';return '<div style="width:78px;height:78px;border-radius:9px;border:1px solid var(--line);background:#f3f0fa;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;color:#666;text-align:center;padding:4px">📄<span style="margin-top:3px">'+bankEsc(((p&&p.name)||"파일").slice(0,8))+'</span></div>';}
function examAssignLabel(ex){
  var t=ex.assignType||"all", vals=ex.assignVals||[];
  if(t==="all"||!vals.length)return "전체 학생";
  if(t==="students")return vals.map(function(id){var st=findStu(id);return st?st.name:"?";}).join(", ");
  return vals.join(", ");
}
function examStats(ex){
  var rs=ex.results||{};
  var ids=Object.keys(rs).filter(function(id){return rs[id]&&rs[id].done&&findStu(id);});
  var scores=ids.map(function(id){return rs[id].score;});
  var n=ids.length, sum=scores.reduce(function(a,b){return a+b;},0);
  var avg=n?Math.round(sum/n):0, max=n?Math.max.apply(null,scores):0, min=n?Math.min.apply(null,scores):0;
  var wc={}; for(var q=1;q<=ex.numQ;q++)wc[q]=0;
  ids.forEach(function(id){(rs[id].wrong||[]).forEach(function(qq){if(wc[qq]!=null)wc[qq]++;});});
  var rates=[]; for(var q2=1;q2<=ex.numQ;q2++)rates.push({q:q2,rate:n?Math.round(wc[q2]/n*100):0,cnt:wc[q2]});
  var top=rates.filter(function(r){return r.cnt>0;}).sort(function(a,b){return b.rate-a.rate||a.q-b.q;}).slice(0,3);
  var maxStu=n?ids.filter(function(id){return rs[id].score===max;}).map(stuName):[];
  var minStu=n?ids.filter(function(id){return rs[id].score===min;}).map(stuName):[];
  return {n:n,avg:avg,max:max,min:min,rates:rates,top:top,maxStu:maxStu,minStu:minStu,ids:ids};
}
function gradeExam(ex,answers){
  var wrong=[],graded=0;
  for(var i=0;i<ex.numQ;i++){
    var k=ex.answerKey[i]; if(k==null||k==="E")continue; graded++;
    var a=answers[i];
    if(a==null||a===""||Number(a)!==Number(k))wrong.push(i+1);
  }
  var score=graded?Math.round((graded-wrong.length)/graded*100):0;
  return {wrong:wrong,score:score};
}

/* ============================== 연습문제 (매쓰프로 대체) ============================== */
function bankQById(id){return (DB.bank||[]).find(function(q){return q.id===id;});}
function findPractice(id){return (DB.practices||[]).find(function(p){return p.id===id;});}
function normAns(v){return String(v==null?"":v).trim().toLowerCase().replace(/\s+/g,"");}
function isMC(q){return !!(q&&q.choices&&q.choices.length&&q.qtype==="객관식");}
function corrText(q){if(isMC(q)){var a=String(q.answer).trim();return /^\d+$/.test(a)?a+"번":a;}return String(q.answer||"");}
function gradePractice(qIds,ansMap){
  var wrong=[],total=0,correct=0;
  (qIds||[]).forEach(function(qid){
    var q=bankQById(qid);if(!q)return;total++;
    var stu=ansMap[qid],ok=false;
    if(isMC(q)){var at=String(q.answer).trim();var chTxt=(stu!=null&&q.choices[stu-1]!=null)?q.choices[stu-1]:"";ok=stu!=null&&(String(stu)===at||normAns(chTxt)===normAns(at));}
    else{var acc=String(q.answer||"").split("|").map(normAns).filter(Boolean);ok=acc.length>0&&acc.indexOf(normAns(stu))>=0;}
    if(ok)correct++;else wrong.push(qid);
  });
  return {wrong:wrong,total:total,correct:correct,score:total?Math.round(correct/total*100):0};
}
function studentWrongIds(s){
  var set={},order=[];
  (DB.practices||[]).forEach(function(p){var r=p.results&&p.results[s.id];if(r&&r.wrong)r.wrong.forEach(function(qid){if(bankQById(qid)&&!set[qid]){set[qid]=1;order.push(qid);}});});
  return order;
}
