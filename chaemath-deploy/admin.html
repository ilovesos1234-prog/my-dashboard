      ${ids.map(function(qid,i){var q=bankQById(qid);return '<div style="padding:8px 2px;border-bottom:1px solid var(--line);font-size:13.5px"><b>'+(i+1)+'.</b> '+bankEsc((q&&q.qText||"(사진 문제)").slice(0,50))+'</div>';}).join("")}</div>`
      :'<div class="empty">오답이 없어요! 완벽해요 🎉</div>'}
    </div>
  `,function(){go("studentHome",{id:s.id});});
  typesetMath();
  var ws=app.querySelector("#wrongStart");
  if(ws)ws.onclick=function(){go("studentPracticeTake",{id:s.id,mode:"wrong"});};
}

/* ============================== PARENT ============================== */
function viewParentPick(){
  const savedId=(lsGet("chaemath_parent_id")||"").replace(/"/g,"&quot;");
  mount(topbar("학부모 로그인",()=>go("hub"),"👨‍👩‍👧")+`
    <div class="scroll">
      <div class="card center" style="margin-top:24px">
        <div style="display:flex;justify-content:center;margin-bottom:4px">${logoWord(30)}</div>
        <div class="sec-title" style="margin-top:14px">학부모 로그인</div>
        <p class="muted" style="margin:0 0 16px">자녀의 <b>아이디·비밀번호</b>로 로그인하면<br>우리 아이의 학습 현황만 볼 수 있어요.</p>
        <input id="pid" placeholder="자녀 아이디" value="${savedId}" autocomplete="username" autocapitalize="off" autocorrect="off" spellcheck="false" />
        <input id="ppw" type="password" placeholder="자녀 비밀번호" autocomplete="current-password" style="margin-top:10px" />
        <label style="display:flex;align-items:center;gap:8px;margin-top:14px;font-size:14px;cursor:pointer;justify-content:center">
          <input type="checkbox" id="pKeep" checked style="width:18px;height:18px"> 아이디 저장
        </label>
        <button class="btn" style="margin-top:12px" id="pLogin">로그인</button>
        <p style="color:var(--danger);font-size:13px;margin:12px 0 0;min-height:18px" id="pErr"></p>
        <p class="muted" style="margin:14px 0 0;font-size:12.5px">※ 아이디·비밀번호는 자녀가 쓰는 것과 같아요. 모르면 원장님께 문의해주세요.</p>
      </div>
    </div>
  `,()=>go("hub"));
  const tryLogin=()=>{
    const raw=app.querySelector("#pid").value.trim();
    const id=raw.toLowerCase();
    const pw=app.querySelector("#ppw").value.trim();
    const keep=app.querySelector("#pKeep").checked;
    const stu=DB.students.find(s=>!s.withdrawn && (s.loginId||"")!=="" && (s.loginId||"").toLowerCase()===id && (s.loginPw||"")===pw);
    if(stu && stu.parentVisible){
      if(keep)lsSet("chaemath_parent_id",raw); else lsDel("chaemath_parent_id");
      toast(stu.name+" 학생 학습현황입니다");go("parentView",{id:stu.id});return;
    }
    if(stu && !stu.parentVisible){ app.querySelector("#pErr").textContent="아직 학부모 공개 설정이 안 된 자녀예요. 원장님께 문의해주세요."; return; }
    app.querySelector("#pErr").textContent="❌ 아이디 또는 비밀번호가 올바르지 않습니다.";
  };
  app.querySelector("#pLogin").onclick=tryLogin;
  app.querySelector("#ppw").onkeydown=e=>{if(e.key==="Enter")tryLogin();};
  app.querySelector("#pid").onkeydown=e=>{if(e.key==="Enter")app.querySelector("#ppw").focus();};
}

function viewParentView(){
  const s=findStu(route.id);if(!s||!s.parentVisible)return go("parentPick");
  const t=todayStr();const tasks=s.planner[t]||[];const done=tasks.filter(x=>x.done).length;
  const days=[];for(let i=6;i>=0;i--){const x=new Date();x.setDate(x.getDate()-i);days.push(ymd(x));}
  let totT=0,totD=0;days.forEach(d=>{const ts=s.planner[d]||[];totT+=ts.length;totD+=ts.filter(x=>x.done).length;});
  const rate=totT?Math.round(totD/totT*100):0;
  mount(topbar(s.name+" 학습현황",()=>go("parentPick"),"열람")+`
    <div class="scroll">
      ${mascotCard(s.name+" 학생, 오늘도 열심히 했어요! 💕","채수학 교습소가 함께합니다")}
      ${(function(){var b=eventBanner();return b?'<div style="margin-bottom:14px">'+b+'</div>':'';})()}
      ${(DB.notice||(DB.noticeImgs&&DB.noticeImgs.length))?'<div class="notice" style="flex-direction:column;align-items:stretch;gap:10px"><div class="row" style="align-items:flex-start;gap:12px"><span class="em">📢</span><div style="flex:1;min-width:0"><b>원장님 공지사항</b><p>'+(DB.notice||'')+'</p>'+((DB.noticeImgs&&DB.noticeImgs.length)?'<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">'+DB.noticeImgs.map(function(u){return '<a href="'+u+'" target="_blank" rel="noopener" style="display:block;width:96px;height:96px;border-radius:10px;overflow:hidden;border:1px solid var(--line)"><img src="'+u+'" loading="lazy" style="width:100%;height:100%;object-fit:cover"></a>';}).join("")+'</div>':'')+'</div></div></div>':''}
      <div class="card">
        <div class="stat">📅 D-Day: <b>${s.dday.title}</b> &nbsp; <span class="pill today">D-${dday(s.dday.date)}</span></div>
        <div class="stat">⏱️ 오늘 순공: <b>${hms(s.studyToday)}</b></div>
        <div class="stat">📅 이번 달 출석: <b>${attCount(s)}일</b></div>
        <div class="stat">✅ 오늘 달성률: <b>${done} / ${tasks.length}</b></div>
        <div class="stat">📊 최근 7일 달성률: <b>${rate}%</b></div>
        <div class="bar"><i style="width:${rate}%"></i></div>
      </div>
      <div class="card">
        <div class="sec-title">${fmtKDate(t)} 플래너</div>
        ${tasks.length?tasks.map(x=>`<div class="stat">${x.done?'<b style="color:var(--ok)">✔</b>':'⬜'} ${x.text}</div>`).join(""):'<div class="empty">오늘 작성된 플래너가 없습니다</div>'}
      </div>
      ${(s.attitudes&&s.attitudes.length)?`<div class="card">
        <div class="sec-title">📝 선생님이 전하는 ${s.name}의 오늘 수업은?</div>
        ${s.attitudes.slice().sort(function(a,b){return (b.date||"").localeCompare(a.date||"");}).slice(0,12).map(function(a){return '<div style="padding:9px 2px;border-bottom:1px dashed var(--line)"><b style="color:var(--green-d);font-size:12.5px">'+fmtKDate(a.date)+'</b> '+atStarsHtml(a.stars)+(a.stamps&&a.stamps.length?('<div style="margin-top:2px">'+atStampsHtml(a.stamps)+'</div>'):'')+(a.text?('<div style="font-size:13.5px;margin-top:3px;line-height:1.55">'+bankEsc(a.text).replace(/\\n/g,"<br>")+'</div>'):'')+'</div>';}).join("")}
      </div>`:''}
      ${s.modeTest?`<div class="card center"><div class="sec-title">복습TEST 결과</div><span class="lvl-badge">${s.modeTest.level}</span><p class="muted" style="margin:8px 0 0">${s.modeTest.score}점</p></div>`:''}
      <div class="sec-title">자세히 보기</div>
      <div class="grid2">
        <div class="menu-card" data-pgo="schedule"><div class="ico">📅</div><div class="t">학원 일정</div><div class="s">휴원·시험일 등</div></div>
        <div class="menu-card" data-pgo="planner"><div class="ico">🗓️</div><div class="t">주간 플래너</div><div class="s">날짜별 과제 보기</div></div>
        <div class="menu-card" data-pgo="report"><div class="ico">📊</div><div class="t">학습 리포트</div><div class="s">종합 성적표</div></div>
        <div class="menu-card" data-pgo="home"><div class="ico">🏠</div><div class="t">채수학 홈페이지</div><div class="s">학원 소개·커리큘럼</div></div>
        <div class="menu-card" data-pgo="blog"><div class="ico">📝</div><div class="t">채수학 블로그</div><div class="s">학원 소식·후기</div></div>
      </div>
      <p class="muted center" style="margin-top:14px">※ 학부모 앱은 열람 전용입니다.</p>
    </div>
  `,()=>go("parentPick"));
  app.querySelectorAll("[data-pgo]").forEach(function(el){el.onclick=function(){
    var k=el.dataset.pgo;
    if(k==="schedule")go("schedule",{id:s.id,role:"parent"});
    else if(k==="planner")go("parentPlanner",{id:s.id});
    else if(k==="report")go("reportCard",{id:s.id,role:"parent"});
    else if(k==="home")goHomepage();
    else if(k==="blog")window.open(BLOG_URL,"_blank");
  };});
}

function dday(date){const d=new Date(date+"T00:00:00");const now=new Date(todayStr()+"T00:00:00");return Math.round((d-now)/86400000);}

/* ============================== ROUTER ============================== */
var NARROW_VIEWS={studentPick:1,studentHome:1,planner:1,timer:1,report:1,ask:1,modeTest:1,studentExams:1,studentExamTake:1,studentExamResult:1,parentPick:1,parentView:1,parentPlanner:1,schedule:1,adminLogin:1,hub:1,board:1};
/* 좌측 사이드바(블로그형 관리 메뉴) — PC 관리자 화면에서만 표시 */
function buildSidebar(v){
  var sb=document.getElementById("adminSidebar"); if(!sb)return;
  if(NARROW_VIEWS[v]||!adminAuthed){ sb.innerHTML=""; return; }
  var nav=[
    {ic:"🏠",t:"관리 홈",r:"pcDash",g:["pcDash"]},
    {ic:"📝",t:"수업 기록 · 과제",r:"classLog",g:["classLog"]},
    {ic:"👥",t:"학생 관리",r:"adminList",g:["adminList","adminStudent","adminAdd","reportCard"]},
    {ic:"📝",t:"시험 · 분석",r:"adminExams",g:["adminExams","examNew","adminExam","examResult"]},
    {ic:"📚",t:"문제은행",r:"bank",g:["bank","bankAdd","bankImport","bankSheet","bankAssign"]},
    {ic:"🗂️",t:"자료방",r:"materials",g:["materials"]},
    {ic:"📅",t:"일정 달력",r:"calendar",g:["calendar"]},
    {ic:"📋",t:"홈피 게시판",r:"adminBoard",g:["adminBoard"]},
    {ic:"👨‍👩‍👧",t:"학부모 관리",r:"adminParents",g:["adminParents"]},
    {ic:"💬",t:"질문 Q&A",r:"adminQ",g:["adminQ"]}
  ];
  if(isOwner())nav.push({ic:"👩‍🏫",t:"강사 관리",r:"adminTeachers",g:["adminTeachers"]});
  nav.push({ic:"⚙️",t:"설정 · 공지",r:"adminHome",g:["adminHome"]});
  var who=isOwner()?"원장님":(bankEsc(authName)+" 선생님");
  var html='<div class="sbBrand"><div class="bw"><span style="color:#ffd7ef">채</span>수학 <small>'+who+' · 관리</small></div></div>';
  html+=nav.map(function(it){var on=it.g.indexOf(v)>=0;return '<div class="sbItem'+(on?' on':'')+'" data-r="'+it.r+'"><span class="i">'+it.ic+'</span>'+it.t+'</div>';}).join("");
  html+='<div class="sbSpace"></div><div class="sbFoot"><div class="sbItem" data-r="__home"><span class="i">🏠</span>채수학 홈페이지</div><div class="sbItem" data-r="__blog"><span class="i">📝</span>채수학 블로그</div>'+(ADMIN_PORTAL?'':'<div class="sbItem" data-r="__hub"><span class="i">↩</span>첫 화면(역할 선택)</div>')+'<div class="sbItem out" data-r="__logout"><span class="i">🚪</span>로그아웃</div></div>';
  sb.innerHTML=html;
  sb.querySelectorAll(".sbItem").forEach(function(el){el.onclick=function(){var r=el.dataset.r;if(r==="__home"){goHomepage();return;}if(r==="__blog"){window.open(BLOG_URL,"_blank");return;}if(r==="__logout"){logoutAuth();toast("로그아웃되었습니다");go(homeView());return;}if(r==="__hub"){go("hub");return;}if(r==="bank")bankSel={};go(r);};});
}
function render(){
  stopTimer();
  const v=route.view;
  /* 관리자(원장·강사) 화면은 넓은 화면에서 대시보드처럼 — 학생/학부모/로그인/홈은 폰 크기 유지 */
  document.body.classList.toggle('wide', !NARROW_VIEWS[v] && adminAuthed);
  buildSidebar(v);
  ({
    hub:viewHub, pcDash:viewPcDash, adminLogin:viewAdminLogin, adminHome:viewAdminHome, adminAdd:viewAdminAdd, adminList:viewAdminList, adminStudent:viewAdminStudent, classLog:viewClassLog, adminQ:viewAdminQ, adminParents:viewAdminParents, calendar:viewCalendar, adminBoard:viewAdminBoard,
    adminExams:viewAdminExams, examNew:viewExamNew, adminExam:viewAdminExam, examResult:viewExamResult, studentExams:viewStudentExams, studentExamTake:viewStudentExamTake, studentExamResult:viewStudentExamResult, materials:viewMaterials,
    bank:viewBank, bankAdd:viewBankAdd, bankImport:viewBankImport, bankSheet:viewBankSheet, bankAssign:viewBankAssign, reportCard:viewReportCard, adminTeachers:viewAdminTeachers,
    bankPractice:viewBankPractice, adminPractices:viewAdminPractices, adminPractice:viewAdminPractice,
    studentPractice:viewStudentPractice, studentPracticeTake:viewStudentPracticeTake, studentPracticeResult:viewStudentPracticeResult, studentWrong:viewStudentWrong,
    studentPick:viewStudentPick, studentHome:viewStudentHome, planner:viewPlanner, timer:viewTimer, report:viewReport,
    ask:viewAsk, modeTest:viewModeTest, parentPick:viewParentPick, parentView:viewParentView, schedule:viewSchedule, parentPlanner:viewParentPlanner, board:viewBoard
  }[v]||viewHub)();
}
render();
if(CLOUD)cloudInit();
/* PWA 서비스워커 등록 (https 또는 localhost에서만 동작; file://에서는 무시) */
if("serviceWorker" in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("sw.js").catch(()=>{});});}
/* 앱을 (다시) 열면 항상 첫 화면(채수학 홈)으로 — 학생/학부모 화면에 머물지 않음 */
window.addEventListener("pageshow",function(e){if(e.persisted){route={view:homeView()};navHist=[];stopTimer();render();}});
let _hiddenAt=0;
document.addEventListener("visibilitychange",function(){
  if(document.hidden){_hiddenAt=Date.now();}
  else if(_hiddenAt&&Date.now()-_hiddenAt>300000){route={view:homeView()};navHist=[];stopTimer();render();}
});
</script>
</body>
</html>
